name: Deploy Web Public
run-name: ${{ github.actor }} is deploying to ${{ github.ref }}
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/food-app-be
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            export NVM_DIR="/home/${{ secrets.SSH_USERNAME }}/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd /opt/food-web-public

            git fetch

            git reset --hard origin/master

            pnpm install

            pnpm build

            pm2 restart food-web-public || pm2 start ecosystem.config.js --env production

            pm2 save

      - name: Notify telegram success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_DEPLOY_WEB_PUBLIC_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          --data-urlencode text="Hey ${{ github.actor }}, mới build hệ thống thành công rồi đó, vô check nha 😁
          ✅ <b>Deploy Success</b>

          🌿 Branch:
          ${{ github.ref_name }}

          📝 Commit:
          <code>${{ github.event.head_commit.message }}</code>

          👤 Author:
          ${{ github.event.head_commit.author.name }}

          🌐 Website:
          https://anzita.com"

      - name: Notify telegram fail
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_DEPLOY_WEB_PUBLIC_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          --data-urlencode text="Hey ${{ github.actor }}, hệ thống build chưa được, vô check thử nha kk 😅
          ❌ <b>Deploy Failed</b>

          🌿 Branch:
          ${{ github.ref_name }}

          📝 Commit:
          <code>${{ github.event.head_commit.message }}</code>

          👤 Author:
          ${{ github.event.head_commit.author.name }}

          🌐 Website:
          https://anzita.com"
